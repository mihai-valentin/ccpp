name: QA

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
      # Opt the action runtime (checkout, setup-node) into Node 24 ahead of
      # the Sept 2026 deprecation. Unrelated to our build target, which
      # stays on Node 20 per `engines` in package.json.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: CI gate (install, build, typecheck, test, pack-check)
        run: make ci

      - name: Lint (advisory — does not fail the pipeline)
        run: make lint
        continue-on-error: true
